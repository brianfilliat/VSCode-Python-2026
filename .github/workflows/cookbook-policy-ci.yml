name: Cookbook / Policy CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate (lint & tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint YAML (optional)
        run: |
          pip install yamllint || true
          if command -v yamllint >/dev/null 2>&1; then yamllint . || true; fi

      - name: Lint Python (optional)
        run: |
          pip install flake8 || true
          if command -v flake8 >/dev/null 2>&1; then flake8 || true; fi

      - name: Run unit tests (optional)
        run: |
          pip install pytest || true
          if [ -d tests ] || [ -f pytest.ini ]; then pytest -q || true; fi

  policy-lint:
    name: Policy Lint
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run policy lint / checks
        run: |
          echo "Replace this with your policy linter (OPA/conftest/chefstyle/etc.)"
          # Example: opa test ./policies || exit 1

  canary-deploy:
    name: Canary Deploy (manual)
    needs: policy-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy canary to staging
        run: |
          echo "Replace with your deploy command (helm/terraform/ansible/az cli)..."
          # e.g. helm upgrade --install my-app ./chart --set rollout.canary=true
      - name: Run smoke tests against canary
        run: |
          echo "Run smoke/synthetic tests here"
          # e.g. ./scripts/smoke_tests.sh https://staging-canary.example.com

  promote-to-production:
    name: Promote to Production (requires approval)
    needs: canary-deploy
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Promote artifact
        run: |
          echo "Promote the tested artifact to production (use immutable artifact hashes)"
          # e.g. helm upgrade --install my-app ./chart --set rollout.canary=false
      - name: Post-promote smoke tests
        run: |
          echo "Validate production after promote"
