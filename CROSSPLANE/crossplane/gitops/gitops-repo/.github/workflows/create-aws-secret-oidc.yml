name: Create Crossplane AWS Secret (OIDC)

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  apply-secret:
    name: Apply `aws-creds` Secret to cluster via OIDC
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Ensure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Update kubeconfig for EKS cluster
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          if [ -z "$EKS_CLUSTER_NAME" ]; then echo "EKS_CLUSTER_NAME not set"; exit 1; fi
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Create aws-creds secret manifest
        env:
          AWS_CREDS: ${{ secrets.AWS_CREDS }}
        run: |
          if [ -z "$AWS_CREDS" ]; then echo "AWS_CREDS not set"; exit 1; fi
          cat > aws-creds.yaml <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: aws-creds
            namespace: crossplane-system
          type: Opaque
          data:
            creds: "$AWS_CREDS"
          EOF

      - name: Apply aws-creds Secret
        run: kubectl apply -f aws-creds.yaml

      - name: Verify secret exists
        run: kubectl get secret aws-creds -n crossplane-system -o yaml
