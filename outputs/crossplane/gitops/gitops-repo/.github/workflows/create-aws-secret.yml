name: Create Crossplane AWS Secret

on:
  workflow_dispatch: {}

jobs:
  apply-secret:
    name: Apply `aws-creds` Secret to cluster
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode Kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is not set"; exit 1
          fi
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_DATA" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Ensure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Create aws-creds secret manifest
        env:
          AWS_CREDS: ${{ secrets.AWS_CREDS }}
        run: |
          if [ -z "$AWS_CREDS" ]; then
            echo "AWS_CREDS secret is not set"; exit 1
          fi
          cat > aws-creds.yaml <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: aws-creds
            namespace: crossplane-system
          type: Opaque
          data:
            creds: "$AWS_CREDS"
          EOF

      - name: Apply aws-creds Secret
        run: |
          kubectl apply -f aws-creds.yaml

      - name: Verify secret exists
        run: |
          kubectl get secret aws-creds -n crossplane-system -o yaml
