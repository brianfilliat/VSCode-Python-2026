---
all:
  children:
    netapp_clusters:
      hosts:
        cluster_site_a:
          ansible_host: 10.10.10.50
          # Host-specific network parameters for the LIF creation
          lif_ip: "10.10.10.60"
          lif_netmask: "255.255.255.0"
          lif_home_node: "node_a_01"
          lif_home_port: "e0c"
        cluster_site_b:
          ansible_host: 10.20.20.50
          lif_ip: "10.20.20.60"
          lif_netmask: "255.255.255.0"
          lif_home_node: "node_b_01"
          lif_home_port: "e0c"
      vars:
        netapp_username: "{{ vault_netapp_username }}"
        netapp_password: "{{ vault_netapp_password }}"
        https: true
        validate_certs: false

    rhel_clients:
      hosts:
        rhel_client_a:
          ansible_host: 10.10.10.101
          nfs_server_ip: "10.10.10.60"  # Points to cluster_site_a's LIF IP
        rhel_client_b:
          ansible_host: 10.20.20.101
          nfs_server_ip: "10.20.20.60"  # Points to cluster_site_b's LIF IP
