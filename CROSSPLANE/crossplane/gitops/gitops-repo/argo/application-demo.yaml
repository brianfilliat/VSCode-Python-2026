apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-postgres-claims
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://example.com/your-gitops-repo.git"
    targetRevision: HEAD
    path: apps/demo
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
