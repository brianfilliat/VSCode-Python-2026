apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-control-plane
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://example.com/your-gitops-repo.git"
    targetRevision: HEAD
    path: base/crossplane-system
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
