---
- name: ONTAP Automation
  hosts: localhost
  gather_facts: false
  collections:
    - netapp.ontap
  tasks:
    - name: Create a Volume
      na_ontap_volume:
        state: present
        name: rhel9_demo_vol
        vserver: svm_name
        aggregate_name: aggr1
        size: 20
        size_unit: gb
        hostname: "{{ netapp_cluster_ip }}"
        username: "{{ netapp_username }}"
        password: "{{ netapp_password }}"
        https: true
        validate_certs: false

